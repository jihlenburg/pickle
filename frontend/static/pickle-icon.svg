<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Pickle body gradient -->
    <linearGradient id="pickleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d6e1e"/>
      <stop offset="35%" stop-color="#4a9e2f"/>
      <stop offset="65%" stop-color="#4a9e2f"/>
      <stop offset="100%" stop-color="#2d6e1e"/>
    </linearGradient>
    <!-- Highlight gradient for 3D effect -->
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Pin metallic gradient -->
    <linearGradient id="pinGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="40%" stop-color="#ddd"/>
      <stop offset="60%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <!-- Shadow for depth -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e"/>

  <!-- IC Pins - left side (8 pins) -->
  <g fill="url(#pinGrad)" stroke="#666" stroke-width="1">
    <rect x="100" y="82"  width="50" height="14" rx="2"/>
    <rect x="100" y="130" width="50" height="14" rx="2"/>
    <rect x="100" y="178" width="50" height="14" rx="2"/>
    <rect x="100" y="226" width="50" height="14" rx="2"/>
    <rect x="100" y="274" width="50" height="14" rx="2"/>
    <rect x="100" y="322" width="50" height="14" rx="2"/>
    <rect x="100" y="370" width="50" height="14" rx="2"/>
    <rect x="100" y="418" width="50" height="14" rx="2"/>
  </g>

  <!-- IC Pins - right side (8 pins) -->
  <g fill="url(#pinGrad)" stroke="#666" stroke-width="1">
    <rect x="362" y="82"  width="50" height="14" rx="2"/>
    <rect x="362" y="130" width="50" height="14" rx="2"/>
    <rect x="362" y="178" width="50" height="14" rx="2"/>
    <rect x="362" y="226" width="50" height="14" rx="2"/>
    <rect x="362" y="274" width="50" height="14" rx="2"/>
    <rect x="362" y="322" width="50" height="14" rx="2"/>
    <rect x="362" y="370" width="50" height="14" rx="2"/>
    <rect x="362" y="418" width="50" height="14" rx="2"/>
  </g>

  <!-- Pickle body (IC chip body shape with pickle curves) -->
  <path d="
    M 148,58
    C 148,48 160,38 180,36
    Q 256,24 332,36
    C 352,38 364,48 364,58
    L 366,62
    C 370,80 368,90 364,100
    C 358,130 362,150 366,170
    C 370,195 368,215 364,240
    C 360,265 362,290 366,315
    C 370,340 368,365 364,385
    C 360,405 362,420 366,438
    L 364,454
    C 364,464 352,474 332,476
    Q 256,488 180,476
    C 160,474 148,464 148,454
    L 146,438
    C 142,420 144,405 148,385
    C 152,365 150,340 146,315
    C 142,290 144,265 148,240
    C 152,215 150,195 146,170
    C 142,150 144,130 148,100
    C 152,90 150,80 146,62
    Z
  " fill="url(#pickleGrad)" stroke="#1e5415" stroke-width="3" filter="url(#shadow)"/>

  <!-- Pickle bumps/texture -->
  <g fill="#3d8825" opacity="0.6">
    <ellipse cx="195" cy="100" rx="12" ry="8" transform="rotate(-15,195,100)"/>
    <ellipse cx="310" cy="140" rx="14" ry="9" transform="rotate(10,310,140)"/>
    <ellipse cx="210" cy="200" rx="11" ry="7" transform="rotate(-8,210,200)"/>
    <ellipse cx="300" cy="260" rx="13" ry="8" transform="rotate(12,300,260)"/>
    <ellipse cx="200" cy="310" rx="12" ry="7" transform="rotate(-5,200,310)"/>
    <ellipse cx="315" cy="360" rx="11" ry="8" transform="rotate(8,315,360)"/>
    <ellipse cx="220" cy="410" rx="13" ry="7" transform="rotate(-10,220,410)"/>
    <ellipse cx="280" cy="170" rx="10" ry="7" transform="rotate(5,280,170)"/>
    <ellipse cx="240" cy="350" rx="12" ry="6" transform="rotate(-12,240,350)"/>
    <ellipse cx="270" cy="440" rx="11" ry="7" transform="rotate(7,270,440)"/>
  </g>

  <!-- 3D highlight on pickle body -->
  <path d="
    M 180,48
    C 200,42 230,38 256,36
    L 256,476
    C 230,474 200,470 180,466
    L 148,454
    L 148,58
    Z
  " fill="url(#highlight)" opacity="0.15"/>

  <!-- IC notch at top (classic DIP marker) -->
  <path d="M 236,36 A 20,12 0 0 1 276,36" fill="#1e5415" stroke="#1a4a10" stroke-width="2"/>

  <!-- Pin 1 dot -->
  <circle cx="180" cy="72" r="8" fill="#5cb83c" opacity="0.7"/>

  <!-- Text label "PIC" etched on body -->
  <text x="256" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#1a4a10" opacity="0.5">PIC</text>
  <text x="256" y="266" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#6bc44a" opacity="0.7">PIC</text>
</svg>
